<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Dashboard - AAA Omega Project</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Kanit:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="./src/assets/css/app.css">
    <link rel="stylesheet" href="./src/assets/css/style.css">
    <script type="text/javascript" src="./src/assets/js/script.js" defer></script>
  </head>
  <body class="dashboard w-dvw h-dvh flex justify-center items-center bg-neutral-lighter">
    <main class="flex w-200 h-fit gap-10 p-5 md:p-10 rounded-2xl bg-white shadow-2xl/10">
      <section class="flex-1">
        <img class="h-115 object-cover" src="./src/assets/images/banner-register.jpg"/>
      </section>
      <section id="register" class="flex flex-1 flex-col flex-wrap justify-center gap-5">
        <div class="heading">
          <h1>สมัครบัญชีใหม่</h1>
          <p>กรอกข้อมูลด้านล่างให้ครบถ้วน</p>
        </div>
        <form>
          <div class="input-row">
            <div class="input-group">
              <label for="firstName">ชื่อจริง</label>
              <input type="text" id="firstName" name="firstName" value="" placeholder="สมชาย" maxlength="120" required>
            </div>
            <div class="input-group">
              <label for="lastName">นามสกุล</label>
              <input type="text" id="lastName" name="lastName" value="" placeholder="ใจดี" maxlength="120" required>
            </div>
          </div>
          <div class="input-group">
            <label for="email">อีเมล</label>
            <input type="email" id="email" name="email" value="" placeholder="account@email.com" maxlength="120" required>
          </div>
          <div class="input-row">
            <div class="input-group">
              <label for="password">เปลี่ยนรหัสผ่าน</label>
              <input type="password" id="password" name="password" placeholder="••••••••">
            </div>
            <div class="input-group">
              <label for="password2">ยืนยันรหัสผ่าน</label>
              <input type="password" id="password2" name="password2" placeholder="••••••••">
            </div>
          </div>
          <div class="button-row">
            <button class="button w-full" onclick="event.preventDefault(); window.location.href='./dashboard-login.html';">ดำเนินการ</button>
          </div>
        </form>
        <hr>
        <div class="flex justify-between items-center">
          <a class="hover:text-content-hover" href="./dashboard-login.html"><span class="icon-material">keyboard_arrow_left</span> ย้อนกลับ</a>
        </div>
      </section>
    </main>
  </body>
</html>
