<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Dashboard - AAA Omega Project</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Kanit:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="./src/assets/css/app.css">
    <link rel="stylesheet" href="./src/assets/css/style.css">
    <script type="text/javascript" src="./src/assets/js/script.js" defer></script>
  </head>
  <body class="dashboard w-dvw h-dvh flex justify-center items-center bg-neutral-lighter">
    <main class="flex w-200 h-fit gap-10 p-5 md:p-10 rounded-2xl bg-white shadow-2xl/10">
      <section class="flex-1">
        <img class="h-115 object-cover" src="./src/assets/images/banner-login.jpg"/>
      </section>
      <section id="login" class="flex flex-1 flex-col flex-wrap justify-center gap-5">
        <div class="heading">
          <h1>ยินดีต้อนรับเข้าสู่ระบบ</h1>
        </div>
        <form>
          <div class="input-group">
            <label for="email">อีเมล</label>
            <input type="email" id="email" name="email" placeholder="account@email.com" maxlength="120" required>
          </div>
          <div class="input-group">
            <label for="password">รหัสผ่าน</label>
            <input type="password" id="password" name="password" placeholder="••••••••">
          </div>
          <div class="button-row">
            <button class="button w-full" onclick="event.preventDefault(); window.location.href='./dashboard.html';">เข้าสู้ระบบ</button>
          </div>
        </form>
        <hr>
        <div class="flex justify-between items-center">
          <a class="hover:text-content-hover" href="./dashboard-forgot-password.html">ลืมรหัสผ่าน?</a>
          <a class="text-primary-base hover:text-primary-hover" href="./dashboard-register.html">สร้างบัญชีใหม่</a>
        </div>
      </section>
    </main>
  </body>
</html>
